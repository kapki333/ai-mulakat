services:
  - type: web
    name: ai-mulakat-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "False"
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000,https://ai-mulakat-i0bnwaica-sef1.vercel.app,https://ai-mulakat-1.vercel.app
      - key: RATE_LIMIT_REQUESTS
        value: "30"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "3600"
